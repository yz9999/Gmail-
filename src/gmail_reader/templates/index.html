<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f6f8fc">
  <title>Gmail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0,0&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <header class="topbar">
    <button class="icon-button menu-button" id="menuButton" aria-label="主菜单">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <a class="brand" href="/" aria-label="Gmail">
      <svg class="gmail-logo" width="32" height="24" viewBox="0 0 32 24" aria-hidden="true">
        <path fill="#4285f4" d="M2.2 21.6h5.1V9.2L0 3.7v15.7c0 1.2 1 2.2 2.2 2.2z"/>
        <path fill="#34a853" d="M24.7 21.6h5.1c1.2 0 2.2-1 2.2-2.2V3.7l-7.3 5.5z"/>
        <path fill="#fbbc04" d="M24.7 3.7v5.5L16 15.7 7.3 9.2V3.7L16 10.2z"/>
        <path fill="#ea4335" d="M24.7 3.7v5.5L32 3.7V2.5C32 .6 29.8-.5 28.3.6zM0 3.7l7.3 5.5V3.7L3.7.6C2.2-.5 0 .6 0 2.5z"/>
      </svg>
      <span>Gmail</span>
    </a>

    <div class="search-wrap" role="search">
      <button class="icon-button search-icon" aria-label="搜索">
        <span class="material-symbols-outlined">search</span>
      </button>
      <input id="searchInput" type="search" placeholder="搜索邮件" autocomplete="off">
      <button class="icon-button filter-button" aria-label="显示搜索选项">
        <span class="material-symbols-outlined">tune</span>
      </button>
    </div>

    <div class="top-actions">
      <button class="icon-button" aria-label="支持"><span class="material-symbols-outlined">help</span></button>
      <button class="icon-button" aria-label="设置"><span class="material-symbols-outlined">settings</span></button>
      <button class="icon-button apps-button" aria-label="Google 应用"><span class="material-symbols-outlined">apps</span></button>
      <button class="avatar" id="avatarButton" aria-label="Google 账号">{{ (address[:1] or 'G')|upper }}</button>
    </div>
  </header>

  <section class="account-menu hidden" id="accountMenu" aria-label="账号菜单">
    <div class="account-menu-top">
      <span>Google 账号</span>
      <button class="icon-button small" id="closeAccountMenu" aria-label="关闭"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="current-account-card" id="currentAccountCard">
      <div class="large-avatar" id="largeAvatar">G</div>
      <strong id="currentAccountName">Gmail</strong>
      <span id="currentAccountAddress">尚未选择账号</span>
    </div>
    <div class="account-list" id="accountList"></div>
    <button class="add-account-button" id="addAccountButton">
      <span class="material-symbols-outlined">person_add</span>
      <span>添加其他账号</span>
    </button>
    <div class="account-menu-footer">隐私权政策&nbsp;&nbsp;•&nbsp;&nbsp;服务条款</div>
  </section>

  <div class="workspace">
    <aside class="sidebar" id="sidebar">
      <button class="compose-button" id="composeButton">
        <span class="material-symbols-outlined">edit</span>
        <span>写邮件</span>
      </button>

      <nav class="mail-nav" aria-label="邮箱">
        <button class="nav-item active" data-view="inbox">
          <span class="material-symbols-outlined filled">inbox</span><span class="nav-label">收件箱</span><span class="nav-count" id="inboxCount"></span>
        </button>
        <button class="nav-item" data-view="starred">
          <span class="material-symbols-outlined">star</span><span class="nav-label">已加星标</span>
        </button>
        <button class="nav-item" data-view="unread">
          <span class="material-symbols-outlined">mark_email_unread</span><span class="nav-label">未读</span>
        </button>
        <button class="nav-item" data-view="sent">
          <span class="material-symbols-outlined">send</span><span class="nav-label">已发邮件</span>
        </button>
        <button class="nav-item" data-view="drafts">
          <span class="material-symbols-outlined">draft</span><span class="nav-label">草稿</span>
        </button>
        <button class="nav-item more-item" id="moreButton">
          <span class="material-symbols-outlined">expand_more</span><span class="nav-label">更多</span>
        </button>
        <div class="more-nav" id="moreNav">
          <button class="nav-item" data-view="all">
            <span class="material-symbols-outlined">stacked_email</span><span class="nav-label">所有邮件</span>
          </button>
          <button class="nav-item" data-view="spam">
            <span class="material-symbols-outlined">report</span><span class="nav-label">垃圾邮件</span>
          </button>
          <button class="nav-item" data-view="trash">
            <span class="material-symbols-outlined">delete</span><span class="nav-label">已删除邮件</span>
          </button>
        </div>
      </nav>

      <div class="labels-title"><span>标签</span><button class="icon-button" aria-label="新建标签"><span class="material-symbols-outlined">add</span></button></div>
    </aside>

    <main class="mail-shell">
      <section class="mail-panel" id="listPanel">
        <div class="toolbar">
          <div class="toolbar-left">
            <label class="check-wrap toolbar-check" aria-label="全选">
              <input type="checkbox" id="selectAll"><span class="custom-check"></span>
            </label>
            <button class="icon-button small" id="refreshButton" aria-label="刷新"><span class="material-symbols-outlined">refresh</span></button>
            <button class="icon-button small" id="toolbarMoreButton" aria-label="更多"><span class="material-symbols-outlined">more_vert</span></button>
          </div>
          <div class="toolbar-right">
            <span class="range-label" id="rangeLabel"></span>
            <button class="icon-button small disabled" id="previousPageButton" aria-label="上一页"><span class="material-symbols-outlined">chevron_left</span></button>
            <button class="icon-button small disabled" id="nextPageButton" aria-label="下一页"><span class="material-symbols-outlined">chevron_right</span></button>
          </div>
        </div>

        <div class="category-tabs">
          <button class="category-tab active"><span class="material-symbols-outlined filled">inbox</span><span>主要</span></button>
          <button class="category-tab"><span class="material-symbols-outlined">sell</span><span>推广</span></button>
          <button class="category-tab"><span class="material-symbols-outlined">group</span><span>社交</span></button>
        </div>

        <div class="message-list" id="messageList" aria-live="polite"></div>
        <div class="toolbar-menu hidden" id="toolbarMenu">
          <button id="markAllReadButton">
            <span class="material-symbols-outlined">mark_email_read</span>
            <span>将所有会话标记为已读</span>
          </button>
          <div class="toolbar-menu-hint">选择邮件即可查看更多操作</div>
        </div>
      </section>

      <section class="mail-panel detail-panel hidden" id="detailPanel">
        <div class="toolbar detail-toolbar">
          <div class="toolbar-left">
            <button class="icon-button small" id="backButton" aria-label="返回"><span class="material-symbols-outlined">arrow_back</span></button>
            <button class="icon-button small" aria-label="归档"><span class="material-symbols-outlined">archive</span></button>
            <button class="icon-button small" aria-label="报告垃圾邮件"><span class="material-symbols-outlined">report</span></button>
            <button class="icon-button small" aria-label="删除"><span class="material-symbols-outlined">delete</span></button>
            <span class="toolbar-divider"></span>
            <button class="icon-button small" id="detailUnread" aria-label="标为未读"><span class="material-symbols-outlined">mark_email_unread</span></button>
            <button class="icon-button small" aria-label="延后处理"><span class="material-symbols-outlined">schedule</span></button>
            <button class="icon-button small" aria-label="添加到任务"><span class="material-symbols-outlined">add_task</span></button>
          </div>
        </div>
        <article class="message-detail">
          <div class="detail-subject-row">
            <h1 id="detailSubject"></h1>
            <span class="label-chip">收件箱</span>
            <button class="icon-button small" aria-label="打印"><span class="material-symbols-outlined">print</span></button>
            <button class="icon-button small" aria-label="在新窗口中打开"><span class="material-symbols-outlined">open_in_new</span></button>
          </div>
          <div class="sender-row">
            <div class="sender-avatar" id="senderAvatar"></div>
            <div class="sender-meta">
              <div><strong id="detailSender"></strong> <span class="muted" id="detailSenderAddress"></span></div>
              <button class="recipient-line">发送至我 <span class="material-symbols-outlined">arrow_drop_down</span></button>
            </div>
            <time id="detailDate"></time>
            <button class="icon-button small" id="detailStar" aria-label="加星标"><span class="material-symbols-outlined">star</span></button>
            <button class="icon-button small" aria-label="回复"><span class="material-symbols-outlined">reply</span></button>
            <button class="icon-button small" aria-label="更多"><span class="material-symbols-outlined">more_vert</span></button>
          </div>
          <div class="detail-body" id="detailBody">
            <iframe
              class="email-html hidden"
              id="detailHtml"
              title="邮件正文"
              sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox"
              referrerpolicy="no-referrer"
            ></iframe>
            <div class="email-plain" id="detailText"></div>
          </div>
          <div class="reply-actions">
            <button><span class="material-symbols-outlined">reply</span>回复</button>
            <button><span class="material-symbols-outlined">forward</span>转发</button>
          </div>
        </article>
      </section>
    </main>

    <aside class="side-apps" aria-label="侧边栏">
      <button aria-label="日历" class="calendar-icon">31</button>
      <button aria-label="Keep"><span class="material-symbols-outlined keep-icon">lightbulb</span></button>
      <button aria-label="Tasks"><span class="material-symbols-outlined tasks-icon">check_circle</span></button>
      <button aria-label="联系人"><span class="material-symbols-outlined contacts-icon">person</span></button>
      <span class="side-divider"></span>
      <button aria-label="获取插件"><span class="material-symbols-outlined">add</span></button>
    </aside>
  </div>

  <section class="compose-window hidden" id="composeWindow" aria-label="新邮件">
    <header>
      <span>新邮件</span>
      <div>
        <button aria-label="最小化" id="minimizeCompose"><span class="material-symbols-outlined">remove</span></button>
        <button aria-label="弹出式窗口"><span class="material-symbols-outlined">open_in_full</span></button>
        <button aria-label="保存并关闭" id="closeCompose"><span class="material-symbols-outlined">close</span></button>
      </div>
    </header>
    <form id="composeForm">
      <div class="compose-field"><input id="composeTo" type="text" placeholder="收件人" required><span>抄送&nbsp;&nbsp;密送</span></div>
      <div class="compose-field"><input id="composeSubject" type="text" placeholder="主题"></div>
      <textarea id="composeBody" aria-label="邮件正文"></textarea>
      <footer>
        <button class="send-button" type="submit"><span>发送</span><span class="send-arrow">▾</span></button>
        <button type="button" class="compose-tool"><span class="material-symbols-outlined">format_color_text</span></button>
        <button type="button" class="compose-tool"><span class="material-symbols-outlined">attach_file</span></button>
        <button type="button" class="compose-tool"><span class="material-symbols-outlined">link</span></button>
        <button type="button" class="compose-tool"><span class="material-symbols-outlined">mood</span></button>
        <button type="button" class="compose-tool"><span class="material-symbols-outlined">add_to_drive</span></button>
        <button type="button" class="compose-tool"><span class="material-symbols-outlined">image</span></button>
        <button type="button" class="compose-tool"><span class="material-symbols-outlined">lock_clock</span></button>
        <span class="compose-spacer"></span>
        <button type="button" class="compose-tool"><span class="material-symbols-outlined">more_vert</span></button>
        <button type="button" class="compose-tool" id="discardCompose"><span class="material-symbols-outlined">delete</span></button>
      </footer>
    </form>
  </section>

  <div class="toast hidden" id="toast" role="status"></div>
  <div class="mobile-scrim hidden" id="mobileScrim"></div>

  <div class="modal-backdrop hidden" id="accountModal">
    <section class="account-dialog" role="dialog" aria-modal="true" aria-labelledby="accountDialogTitle">
      <header>
        <div>
          <svg class="gmail-logo" width="32" height="24" viewBox="0 0 32 24" aria-hidden="true">
            <path fill="#4285f4" d="M2.2 21.6h5.1V9.2L0 3.7v15.7c0 1.2 1 2.2 2.2 2.2z"/><path fill="#34a853" d="M24.7 21.6h5.1c1.2 0 2.2-1 2.2-2.2V3.7l-7.3 5.5z"/><path fill="#fbbc04" d="M24.7 3.7v5.5L16 15.7 7.3 9.2V3.7L16 10.2z"/><path fill="#ea4335" d="M24.7 3.7v5.5L32 3.7V2.5C32 .6 29.8-.5 28.3.6zM0 3.7l7.3 5.5V3.7L3.7.6C2.2-.5 0 .6 0 2.5z"/>
          </svg>
          <h2 id="accountDialogTitle">添加 Gmail 账号</h2>
        </div>
        <button class="icon-button" id="closeAccountDialog" aria-label="关闭"><span class="material-symbols-outlined">close</span></button>
      </header>
      <form id="accountForm">
        <label class="outlined-field">
          <input id="accountName" type="text" placeholder=" " autocomplete="off">
          <span>账号名称（选填）</span>
        </label>
        <label class="outlined-field">
          <input id="accountAddress" type="email" placeholder=" " autocomplete="username" required>
          <span>Gmail 地址</span>
        </label>
        <label class="outlined-field password-field">
          <input id="accountPassword" type="password" placeholder=" " autocomplete="new-password" required>
          <span>16 位应用专用密码</span>
          <button type="button" id="toggleAccountPassword" aria-label="显示密码"><span class="material-symbols-outlined">visibility</span></button>
        </label>
        <p class="account-help">账号需要开启两步验证，并在 Google 账号中生成应用专用密码。密码仅保存在本机配置文件中。</p>
        <div class="dialog-error hidden" id="accountError"></div>
        <footer>
          <button type="button" class="text-button" id="cancelAccountDialog">取消</button>
          <button type="submit" class="primary-button" id="saveAccountButton">验证并添加</button>
        </footer>
      </form>
    </section>
  </div>

  <script>window.GMAIL_ADDRESS = {{ address|tojson }};</script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
