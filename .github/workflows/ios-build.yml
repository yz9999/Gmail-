name: Build iOS App

on:
  push:
    branches:
      - ios-app
    tags:
      - "ios-v*"
  pull_request:
    branches:
      - ios-app
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Unsigned iPhone Build
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve Swift packages
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project GmailReaderIOS.xcodeproj \
            -scheme GmailReaderIOS

      - name: Build unsigned iOS app
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build
          xcodebuild \
            -project GmailReaderIOS.xcodeproj \
            -scheme GmailReaderIOS \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath "$PWD/build/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            clean build | tee build/xcodebuild.log

      - name: Package build artifact
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          test -n "$APP_PATH"
          test -d "$APP_PATH"

          mkdir -p build/artifacts/Payload
          ditto "$APP_PATH" "build/artifacts/Payload/$(basename "$APP_PATH")"
          (
            cd build/artifacts
            zip -qry GmailReaderIOS-unsigned.ipa Payload
            ditto -c -k --sequesterRsrc --keepParent "Payload/$(basename "$APP_PATH")" GmailReaderIOS-unsigned-app.zip
            shasum -a 256 GmailReaderIOS-unsigned.ipa GmailReaderIOS-unsigned-app.zip > SHA256SUMS.txt
          )

          plutil -p "$APP_PATH/Info.plist"

      - name: Upload unsigned app
        uses: actions/upload-artifact@v4
        with:
          name: GmailReaderIOS-unsigned-${{ github.sha }}
          path: |
            build/artifacts/GmailReaderIOS-unsigned.ipa
            build/artifacts/GmailReaderIOS-unsigned-app.zip
            build/artifacts/SHA256SUMS.txt
            build/xcodebuild.log
          if-no-files-found: error
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/ios-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            build/artifacts/GmailReaderIOS-unsigned.ipa \
            build/artifacts/GmailReaderIOS-unsigned-app.zip \
            build/artifacts/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --title "Gmail Reader iOS ${GITHUB_REF_NAME#ios-v} (Unsigned)" \
            --generate-notes \
            --notes "Release 配置编译产物。此版本未使用 Apple Developer 证书签名，适用于构建验证、重签名或后续发布流程，不能直接安装到普通 iPhone。"
